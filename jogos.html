<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faelzinn390 - Jogos</title>
    <style>
        @font-face {
            font-family: 'PS3Font';
            src: url('Mata Regular.otf') format('truetype'); /* Ajuste a extensão se for .woff2 ou .otf */
        }

        body {
            font-family: 'PS3Font', sans-serif;
            background: url('wpp.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; /* Evita barras de rolagem desnecessárias */
        }

.barra-pesquisa {
    background: rgba(0,0,0,0.7);
    color: white;
    border: 1px solid red;
}

        h1, h2 {
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        h2 {
            border-bottom: 2px solid #ff0000;
            padding-bottom: 5px;
            margin-top: 40px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Estilo do Card */
        .card {
            display: flex;
            flex-direction: row;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            max-width: 350px; /* Tamanho ideal para celular e PC */
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .card:hover {
            transform: scale(1.03);
            border: 1px solid #ff4d4d;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
        }

        /* Imagem da Capa */
        .game-thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* Informações ao lado da foto */
        .card-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 15px;
            flex-grow: 1;
        }

        .game-title {
            margin: 0 0 10px 0;
            font-size: 16px;
            font-weight: bold;
        }

       /* Estilo do botão Voltar/Sair */
.btn-voltar {
    position: fixed; /* Fixa na tela */
    top: 15px;
    left: 15px;
    z-index: 9999; /* Fica acima de tudo */
}

.btn-voltar img {
    width: 100px; /* Ajuste o tamanho conforme sua imagem sair.png */
    height: auto;
    cursor: pointer;
    transition: 0.3s;
}

.btn-voltar img:hover {
    transform: scale(1.1);
    filter: brightness(1.2);
}

/* Ajuste opcional para o título não bater na imagem no celular */
h1 {
    margin-top: 50px;
}

        /* Botão de Download (Imagem) */
        .download-link img {
            width: 110px; /* Tamanho da sua imagem de download */
            height: auto;
            transition: 0.2s;
        }

        .download-link img:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }
    </style>
</head>

<script>
function filtrar() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let titulo = card.querySelector(".game-title").innerText.toLowerCase();
        card.style.display = titulo.includes(input) ? "flex" : "none";
    });
}
</script>
