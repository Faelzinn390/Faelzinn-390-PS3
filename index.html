<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faelzinn390 - Início</title>
    <style>
        /* 
           1. Baixe a fonte 'Zrnic' ou a original do PS3.
           2. Salve o arquivo na mesma pasta do seu index.html.
           3. Mude o nome abaixo para o nome exato do arquivo (ex: zrnic.ttf).
        */
        @font-face {
            font-family: 'PS3Font';
            src: url('Mata Regular.otf') format('truetype'); /* Ajuste a extensão se for .woff2 ou .otf */
        }

        body {
            font-family: 'PS3Font', sans-serif;
            background: url('WPP.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden; /* Evita barras de rolagem desnecessárias */
        }

        .menu-container {
            background: rgba(0, 0, 0, 0.7); /* Um pouco mais transparente fica elegante */
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); /* Efeito de brilho leve */
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .btn-box {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .botao-entrada {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            transition: 0.3s ease;
            border: 2px solid transparent;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .btn-jogos { background: #e74c3c; }
        .btn-homebrew { background: #2980b9; }

        .botao-entrada:hover {
            transform: scale(1.1);
            border-color: white;
            box-shadow: 0 0 15px white;
        }

        .botao-entrada img {
            width: 80%; /* Ajustado para não tocar nas bordas */
            height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>Faelzinn390</h1>
        <p style="font-family: sans-serif; opacity: 0.8;">Escolha uma categoria para navegar:</p>
        <div class="btn-box">
            <a href="jogos.html" class="botao-entrada btn-jogos">
                <img src="J.png" alt="Jogos">
            </a>
            <a href="homebrew.html" class="botao-entrada btn-homebrew">
                <img src="HB.jpg" alt="Homebrew">
            </a>
        </div>
    </div>
</body>
</html>
